<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Study abroad · Köln — VJ's dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  html, body, #root { margin: 0; padding: 0; }
  body { background: #e6dfd2; font-family: 'Inter', sans-serif; }
  * { box-sizing: border-box; }
  #root { min-height: 100vh; }
  .v1-wrap { max-width: 1240px; margin: 0 auto; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  function App() {
    const resetState = () => {
      if (confirm('Reset all check-offs, notes, comments, and edited numbers?')) {
        localStorage.removeItem(KD.STORAGE_KEY);
        location.reload();
      }
    };

    return (
      <div className="v1-wrap">
        <VariationA onReset={resetState}/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

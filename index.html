<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Study abroad · Köln — VJ's dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  html, body, #root { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  /* Theme tokens — light is the warm-sand notebook, dark is a phosphor
     terminal that keeps the warm DNA (cream on near-black, accent stays
     orange). All inline P.foo refs across components map to these vars. */
  :root, [data-theme="light"] {
    --kd-paper:        #f5efe4;
    --kd-card:         #fffaf1;
    --kd-drawer:       #fbf5e9;
    --kd-hover:        #f0e7d4;
    --kd-ink:          #1a120a;
    --kd-dim-strong:   #4d3f31;
    --kd-dim:          #7a6a55;
    --kd-dim-soft:     #b0a288;
    --kd-accent:       #c14a1c;
    --kd-accent-soft:  #f4e0cb;
    --kd-danger:       #a02a2a;
    --kd-success:      #3f7a3a;
    --kd-line-soft:    rgba(26,18,10,0.06);
    --kd-line:         rgba(26,18,10,0.09);
    --kd-line-mid:     rgba(26,18,10,0.13);
    --kd-line-strong:  rgba(26,18,10,0.17);
    --kd-line-dashed:  rgba(26,18,10,0.20);
    --kd-overlay:      rgba(26,18,10,0.28);
    --kd-overlay-strong: rgba(26,18,10,0.42);
    --kd-body-bg:      #e9ddc6;
    --kd-scanlines:    transparent;
  }
  [data-theme="dark"] {
    --kd-paper:        #13100b;
    --kd-card:         #1c1812;
    --kd-drawer:       #1f1a13;
    --kd-hover:        #2a231a;
    --kd-ink:          #f0e6d0;
    --kd-dim-strong:   #d4c5a3;
    --kd-dim:          #a59679;
    --kd-dim-soft:     #7a6b54;
    --kd-accent:       #e07140;
    --kd-accent-soft:  rgba(224,113,64,0.14);
    --kd-danger:       #d95d5d;
    --kd-success:      #6fae66;
    --kd-line-soft:    rgba(232,220,196,0.06);
    --kd-line:         rgba(232,220,196,0.09);
    --kd-line-mid:     rgba(232,220,196,0.14);
    --kd-line-strong:  rgba(232,220,196,0.20);
    --kd-line-dashed:  rgba(232,220,196,0.24);
    --kd-overlay:      rgba(0,0,0,0.55);
    --kd-overlay-strong: rgba(0,0,0,0.72);
    --kd-body-bg:      #0d0a08;
    --kd-scanlines: repeating-linear-gradient(
      to bottom,
      rgba(232,220,196,0.025) 0px,
      rgba(232,220,196,0.025) 1px,
      transparent 1px,
      transparent 4px
    );
  }
  body {
    background: var(--kd-body-bg);
    font-family: 'Figtree', -apple-system, 'Segoe UI', sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    transition: background 0.3s ease;
  }
  /* CRT phosphor scanlines — only painted in dark mode (light has transparent). */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background: var(--kd-scanlines);
    z-index: 9999;
    mix-blend-mode: overlay;
  }
  * { box-sizing: border-box; }
  #root { min-height: 100vh; }
  .v1-wrap { max-width: 1420px; margin: 0 auto; }

  @media (max-width: 720px) {
    /* Prevent iOS auto-zoom on focus by enforcing 16px min on inputs.
       Exclude large display inputs (e.g. FX calculator) via .v1-large-input. */
    input:not(.v1-large-input), textarea, select { font-size: 16px !important; }
    body { overflow-x: hidden; }

    .v1-root { padding: 20px 16px 40px !important; }

    /* Masthead stacks vertically */
    .v1-masthead {
      flex-direction: column !important;
      align-items: flex-start !important;
      gap: 12px;
      padding-bottom: 16px !important;
      margin-bottom: 20px !important;
    }
    .v1-h1 { font-size: 38px !important; letter-spacing: -0.5px !important; }
    .v1-masthead-right { text-align: left !important; }

    /* Multi-column grids collapse to single column */
    .v1-hero-row,
    .v1-money-stats,
    .v1-tasks-grid,
    .v1-readiness-grid {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }

    /* Tighter section spacing */
    .v1-hero-row { margin-bottom: 20px !important; }
    .v1-section-h2 { font-size: 24px !important; }

    /* Days-until card: scale down from 120px */
    .v1-days-num { font-size: 72px !important; letter-spacing: -2px !important; flex-wrap: wrap; }
    .v1-days-card,
    .v1-ring-card,
    .v1-fx-card { padding: 18px 20px !important; }

    /* Money card inner padding */
    .v1-money-card { padding: 18px !important; }
    .v1-money-stats { gap: 14px !important; }

    /* Tasks header: stack h2+subtext above filter pills */
    .v1-tasks-head {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 10px !important;
    }
    .v1-tasks-head > div { flex-wrap: wrap; }
    .v1-tab-btn {
      padding: 8px 16px !important;
      font-size: 13px !important;
      min-height: 36px;
    }

    /* Timeline row: let chip wrap below the text */
    .v1-timeline-row {
      display: flex !important;
      flex-wrap: wrap;
      gap: 4px 10px !important;
      padding-left: 30px !important;
      grid-template-columns: none !important;
      align-items: baseline;
    }
    .v1-timeline-when { flex: 0 0 auto; }
    .v1-timeline-what { flex: 1 1 60%; min-width: 0; }

    /* Hide uppercase status label next to the dot to save line width */
    .v1-status-label { display: none !important; }

    /* Footer stacks */
    .v1-foot {
      flex-direction: column !important;
      align-items: flex-start !important;
      gap: 10px;
    }

    /* Task drawer / line drawer / dialogs fill the screen */
    .v1-drawer {
      width: 100% !important;
      max-width: 100% !important;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom)) !important;
      -webkit-overflow-scrolling: touch;
    }
    .v1-dialog {
      width: 100% !important;
      max-width: 100% !important;
      max-height: calc(100dvh - 24px);
      overflow-y: auto;
      padding: 18px !important;
      border-radius: 14px !important;
    }

    /* Larger checkbox tap target on task rows */
    .v1-task-row { grid-template-columns: 28px 1fr auto !important; }
    .v1-task-check { width: 24px !important; height: 24px !important; margin-top: 0 !important; }

    /* EditableNumber input shouldn't force 140px on tight cells */
    .v1-editable-input { width: 100% !important; max-width: 140px; }

    /* Pinned chips in the Recent strip — tighter text + smaller max */
    .v1-pin-chip { max-width: 100% !important; }
    .v1-pin-chip-text { max-width: 150px !important; }
    .v1-activity { padding: 10px 12px !important; gap: 10px !important; }

    /* Blocked-account monthly release strip: 12 cols → 6 wraps */
    .v1-blocked-months {
      grid-template-columns: repeat(6, minmax(0, 1fr)) !important;
      gap: 5px !important;
    }
    /* Blocked-account flow steps: stack to single column for clarity */
    .v1-blocked-flow {
      grid-template-columns: 1fr !important;
      gap: 8px !important;
    }
    /* Key facts: stay single column on phones */
    .v1-blocked-facts {
      grid-template-columns: 1fr !important;
      gap: 18px !important;
    }
    /* Section header chevron + title: keep on one line, allow subtitle wrap */
    .v1-section-h2 { font-size: 22px !important; }

    /* Theme toggle stays compact in stacked masthead */
    .v1-toc { display: none !important; }

    /* Milestone add form stacks vertically on phones */
    .v1-milestone-form {
      grid-template-columns: 1fr !important;
      gap: 8px !important;
    }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  function App() {
    const resetState = () => {
      if (confirm('Reset all check-offs, notes, comments, and edited numbers?')) {
        localStorage.removeItem(KD.STORAGE_KEY);
        location.reload();
      }
    };

    return (
      <div className="v1-wrap">
        <VariationA onReset={resetState}/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
